<script type="text/babel">
const {useState, useEffect, useRef, useCallback, useMemo} = React;

// Wave bars are pure decoration — random heights/timings for animation only
const WAVE_H   = Array.from({length:44}, ()=> 0.1 + Math.random() * 0.9);
const WAVE_DUR = Array.from({length:44}, ()=> (0.3 + Math.random() * 0.6).toFixed(2));
const WAVE_DEL = Array.from({length:44}, (_,i)=> (i * 0.018).toFixed(3));

const AI_LABEL_MAP = {
  SHOUTING:          {label:'Raised voice detected',   eventType:'shout'},
  SCREAMING:         {label:'Screaming detected',       eventType:'impact'},
  CRYING:            {label:'Crying detected',          eventType:'impact'},
  IMPACT:            {label:'Impact sound detected',   eventType:'impact'},
  GUNSHOT:           {label:'Gunshot-like sound',       eventType:'impact'},
  SLAP:              {label:'Slap sound detected',     eventType:'impact'},
  DOOR_SLAM:         {label:'Door slam detected',      eventType:'impact'},
  GLASS_BREAKING:    {label:'Glass breaking',           eventType:'impact'},
  EXTENDED_SILENCE:  {label:'Extended silence',         eventType:'silence'},
  SPEECH_NORMAL:     {label:'Normal speech',            eventType:'speech'},
};

const ALERT_AUDIO_LABELS = new Set([
  'SHOUTING',
  'SCREAMING',
  'CRYING',
  'IMPACT',
  'GUNSHOT',
  'SLAP',
  'DOOR_SLAM',
  'GLASS_BREAKING',
]);

function tsToTime(ts) {
  return new Date(ts).toLocaleTimeString('en-GB', {hour:'2-digit', minute:'2-digit', second:'2-digit'});
}

function headingToCardinal(deg) {
  if (deg == null) return '—';
  const dirs = ['N','NE','E','SE','S','SW','W','NW'];
  return dirs[Math.round(((deg % 360) + 360) % 360 / 45) % 8] + ' ' + Math.round(deg) + '°';
}

function signalStrength(accuracy) {
  if (accuracy == null) return {label:'—', color:'rgba(255,255,255,.3)'};
  if (accuracy <= 5)  return {label:'Strong',   color:'#34d399'};
  if (accuracy <= 15) return {label:'Good',      color:'#3b82f6'};
  if (accuracy <= 30) return {label:'Moderate',  color:'#f59e0b'};
  return                     {label:'Weak',      color:'#ff3b5c'};
}

function formatBatteryHealth(gps) {
  if (!gps) return null;
  if (gps.battery_health === 'power-save') return 'Power save';
  if (gps.battery_health) return gps.battery_health.toUpperCase();
  if (gps.battery_state) return gps.battery_state.toUpperCase();
  return null;
}


// ── Incident state — driven by Hypercore entries ────────────────
function useIncidentState() {
  const [connected, setConnected]           = useState(false);
  const [session, setSession]               = useState(null);     // {personName, startTs}
  const [tier, setTier]                     = useState(0);
  const [gps, setGps]                       = useState(null);     // latest gps payload
  const [trail, setTrail]                   = useState([]);       // [{lat,lng}] movement history
  const [audioLabels, setAudioLabels]       = useState([]);       // [{time,eventType,label,conf}]
  const [incidentLog, setIncidentLog]       = useState([]);       // [{ts,label,sub,dot}]
  const [transcripts, setTranscripts]       = useState([]);       // [{ts,text}]
  const [videoAnnotation, setVideoAnnotation] = useState(null);
  const [videoAiStatus, setVideoAiStatus]   = useState(null);
  const [videoFrozen, setVideoFrozen]       = useState(true);
  const [staleSecs, setStaleSecs]           = useState(0);
  const [elapsed, setElapsed]               = useState(0);
  const lastVideoRef                        = useRef(null);

  const pushLog = useCallback((entry) => {
    setIncidentLog(log => [entry, ...log].slice(0, 100));
  }, []);

  const addEntry = useCallback((entry) => {
    const {type, ts, payload} = entry;
    switch (type) {
      case 'incident_start':
        setConnected(true);
        setSession({personName: payload.personName, startTs: ts});
        pushLog({ts, label:'Session started', sub: payload.personName, dot:'grey'});
        break;

      case 'tier_change': {
        setTier(payload.toTier);
        const TIER_LABELS  = {1:'Tier 1 — audio active', 2:'Tier 2 — video active', 3:'Emergency — Tier 3'};
        const TIER_DOTS    = {1:'amber', 2:'amber', 3:'red'};
        const TRIGGER_LABELS = {codeword:'Codeword trigger', ai_auto:'AI auto-trigger', manual:'Manual trigger'};
        pushLog({ts, label: TIER_LABELS[payload.toTier] || `Tier ${payload.toTier}`, sub: TRIGGER_LABELS[payload.trigger] || payload.trigger, dot: TIER_DOTS[payload.toTier] || 'grey'});
        break;
      }

      case 'gps':
        setGps(payload);
        setTrail(prev => [...prev.slice(-49), {lat: payload.lat, lng: payload.lng}]);
        pushLog({ts, label:'Location update', sub: payload.address || `${payload.lat.toFixed(4)}° N  ${payload.lng.toFixed(4)}° E`, dot:'blue'});
        break;

      case 'ai_label': {
        const mapped = AI_LABEL_MAP[payload.label] || {label: payload.label, eventType:'speech'};
        const conf   = Math.round(payload.confidence * 100);
        setAudioLabels(prev => [{time: tsToTime(ts), eventType: mapped.eventType, label: mapped.label, conf}, ...prev].slice(0, 30));
        if (ALERT_AUDIO_LABELS.has(payload.label)) {
          pushLog({ts, label: mapped.label, sub:`AI audio — ${conf}% confidence`, dot: conf >= 85 ? 'red' : 'amber'});
        }
        break;
      }

      case 'ai_video_annotation':
        setVideoAnnotation(payload);
        setVideoFrozen(false);
        lastVideoRef.current = ts;
        if (payload.poseFlags && payload.poseFlags.length > 0) {
          pushLog({ts, label: payload.poseFlags.map(f => f.replace(/_/g,' ')).join(', '), sub:`Video AI${payload.source ? ` (${payload.source})` : ''}`, dot:'amber'});
        }
        break;

      case 'ai_video_status':
        setVideoAiStatus(payload);
        if (payload.status === 'failed' || payload.status === 'unavailable') {
          pushLog({ts, label:'Video AI fallback active', sub: payload.reason || payload.status, dot:'amber'});
        }
        break;

      case 'video_chunk':
        setVideoFrozen(false);
        lastVideoRef.current = ts;
        break;

      case 'transcript':
        setTranscripts(prev => [{ts, text: payload.text}, ...prev].slice(0, 100));
        break;

      case 'incident_end':
        pushLog({ts, label:'Session ended', sub:`Duration: ${Math.round(payload.durationMs / 1000)}s`, dot:'grey'});
        break;

      default:
        break;
    }
  }, [pushLog]);

  const reset = useCallback(() => {
    setConnected(false);
    setSession(null);
    setTier(0);
    setGps(null);
    setTrail([]);
    setAudioLabels([]);
    setIncidentLog([]);
    setTranscripts([]);
    setVideoAnnotation(null);
    setVideoAiStatus(null);
    setVideoFrozen(true);
    setStaleSecs(0);
    setElapsed(0);
    lastVideoRef.current = null;
  }, []);

  // Expose entry API for P2P layer
  useEffect(() => {
    window.addSafeHavenEntry    = addEntry;
    window.setSafeHavenConnected = setConnected;
    window.resetSafeHaven        = reset;
    const onEvent = (e) => addEntry(e.detail);
    window.addEventListener('safehaven:entry', onEvent);
    return () => window.removeEventListener('safehaven:entry', onEvent);
  }, [addEntry, reset]);

  // Session elapsed timer
  useEffect(() => {
    if (!session) return;
    const id = setInterval(() => setElapsed(Math.floor((Date.now() - session.startTs) / 1000)), 1000);
    return () => clearInterval(id);
  }, [session]);

  // Stale video counter
  useEffect(() => {
    if (videoFrozen && lastVideoRef.current) {
      const id = setInterval(() => setStaleSecs(s => s + 1), 1000);
      return () => clearInterval(id);
    }
    setStaleSecs(0);
  }, [videoFrozen]);

  const riskLevel = tier >= 3 ? 'HIGH' : tier >= 1 ? 'MED' : 'LOW';
  const alertMode = tier >= 3;

  return {connected, session, tier, gps, trail, audioLabels, incidentLog, videoAnnotation, videoAiStatus, videoFrozen, staleSecs, elapsed, riskLevel, alertMode, addEntry, setConnected, reset};
}

// ── WS-to-signaling-server connectivity. Distinct from `connected` (which
// means an incident is active): this just reflects whether we can reach the
// server. UI uses it to differentiate "truly offline" from "online but no
// incident yet" so the receiver doesn't sit on a "waiting for connection"
// spinner pre-incident.
function useWsState() {
  const [wsConnected, setWsConnected] = useState(!!window.__safehavenWsConnected);
  useEffect(() => {
    const onWs = (e) => setWsConnected(!!e.detail);
    window.addEventListener('safehaven:wsstate', onWs);
    return () => window.removeEventListener('safehaven:wsstate', onWs);
  }, []);
  return wsConnected;
}

// ── Live MediaStream channel — set by the WebRTC signaling layer below.
// hasVideo flips true the moment a video track lands (which happens on T2
// renegotiation, separately from the initial audio-only stream attachment).
function useLiveStream() {
  const [stream, setStream] = useState(null);
  const [hasVideo, setHasVideo] = useState(false);
  useEffect(() => {
    const onStream = (e) => setStream(e.detail || null);
    const onVideo = () => setHasVideo(true);
    window.addEventListener('safehaven:stream', onStream);
    window.addEventListener('safehaven:videoready', onVideo);
    if (window.__safehavenStream) setStream(window.__safehavenStream);
    if (window.__safehavenHasVideo) setHasVideo(true);
    return () => {
      window.removeEventListener('safehaven:stream', onStream);
      window.removeEventListener('safehaven:videoready', onVideo);
    };
  }, []);
  // Source of truth: the stream's actual track list. pc.ontrack can miss
  // renegotiation track additions on some WebRTC builds, so we ALSO listen
  // for `addtrack` on the stream itself and re-check when it changes.
  useEffect(() => {
    if (!stream) { setHasVideo(false); return; }
    const recheck = () => setHasVideo(stream.getVideoTracks().length > 0);
    recheck();
    stream.addEventListener?.('addtrack', recheck);
    stream.addEventListener?.('removetrack', recheck);
    return () => {
      stream.removeEventListener?.('addtrack', recheck);
      stream.removeEventListener?.('removetrack', recheck);
    };
  }, [stream]);
  return { stream, hasVideo };
}

// Web Audio analyser tap on the live stream — drives the LIVE AUDIO bars
// off real frequency data instead of the decorative random animation.
// The <video> element handles audible playback; we deliberately do NOT
// connect the analyser to ac.destination, otherwise audio plays twice.
function useAudioLevels(stream, barCount = 44) {
  const [levels, setLevels] = useState(null);
  useEffect(() => {
    if (!stream) { setLevels(null); return; }
    const audioTracks = stream.getAudioTracks();
    if (!audioTracks.length) { setLevels(null); return; }

    const Ctx = window.AudioContext || window.webkitAudioContext;
    if (!Ctx) return;

    let ac, src, analyser, raf;
    try {
      ac = new Ctx();
      src = ac.createMediaStreamSource(stream);
      analyser = ac.createAnalyser();
      analyser.fftSize = 128;
      analyser.smoothingTimeConstant = 0.7;
      src.connect(analyser);
    } catch (err) {
      console.warn('[audio] analyser setup failed:', err);
      return;
    }

    // Safari ships AudioContext suspended until a user gesture. Hook a
    // one-shot resume to the next tap so bars start animating.
    const resume = () => { ac.resume?.(); };
    if (ac.state === 'suspended') {
      document.addEventListener('click', resume, { once: true, capture: true });
      document.addEventListener('touchstart', resume, { once: true, capture: true });
    }

    const data = new Uint8Array(analyser.frequencyBinCount);
    let last = 0;
    function tick(t) {
      // ~30fps is plenty for the bar UI and avoids 60fps React churn.
      if (t - last > 33) {
        analyser.getByteFrequencyData(data);
        const out = new Array(barCount);
        const binsPerBar = data.length / barCount;
        for (let i = 0; i < barCount; i++) {
          const start = Math.floor(i * binsPerBar);
          const end   = Math.max(start + 1, Math.floor((i + 1) * binsPerBar));
          let sum = 0;
          for (let j = start; j < end; j++) sum += data[j];
          out[i] = (sum / (end - start)) / 255;
        }
        setLevels(out);
        last = t;
      }
      raf = requestAnimationFrame(tick);
    }
    raf = requestAnimationFrame(tick);

    return () => {
      cancelAnimationFrame(raf);
      try { src.disconnect(); } catch (_) {}
      try { analyser.disconnect(); } catch (_) {}
      try { ac.close(); } catch (_) {}
      document.removeEventListener('click', resume, true);
      document.removeEventListener('touchstart', resume, true);
    };
  }, [stream, barCount]);
  return levels;
}

// ── GPS Map (Leaflet + CARTO dark tiles — free, no API key) ───
function GPSMap({gps, alertMode, trail, height='clamp(320px, 48vh, 560px)'}) {
  const mapDivRef    = useRef(null);
  const mapRef       = useRef(null);
  const markerRef    = useRef(null);
  const circleRef    = useRef(null);
  const polyRef      = useRef(null);
  const geocodeTimer = useRef(null);
  const [address, setAddress] = useState(null);

  const ac     = alertMode ? '#ff3b5c' : '#3b82f6';
  const stroke = alertMode ? '#ffaabb' : '#93c5fd';
  const hasFix = gps && gps.lat != null;

  // Initialize Leaflet map once on mount
  useEffect(() => {
    if (!mapDivRef.current || mapRef.current) return;
    const center = gps ? [gps.lat, gps.lng] : [41.3970, 2.1606];
    const map = L.map(mapDivRef.current, {
      center, zoom: 17,
      zoomControl: false,
      attributionControl: false,
    });
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
      subdomains: 'abcd', maxZoom: 20,
    }).addTo(map);
    mapRef.current = map;
    return () => {
      map.remove();
      mapRef.current = null; markerRef.current = null;
      circleRef.current = null; polyRef.current = null;
    };
  }, []);

  // Update marker + accuracy circle + pan + geocode on GPS change
  useEffect(() => {
    if (!mapRef.current || !gps) return;
    const ll = [gps.lat, gps.lng];

    if (!markerRef.current) {
      markerRef.current = L.circleMarker(ll, {
        radius: 8, fillColor: ac, fillOpacity: 1, color: stroke, weight: 2.5,
      }).addTo(mapRef.current);
    } else {
      markerRef.current.setLatLng(ll);
      markerRef.current.setStyle({fillColor: ac, color: stroke});
    }

    if (!circleRef.current) {
      circleRef.current = L.circle(ll, {
        radius: Math.max(gps.accuracy || 10, 3),
        fillColor: ac, fillOpacity: 0.07,
        color: ac, opacity: 0.3, weight: 1,
      }).addTo(mapRef.current);
    } else {
      circleRef.current.setLatLng(ll);
      circleRef.current.setRadius(Math.max(gps.accuracy || 10, 3));
      circleRef.current.setStyle({fillColor: ac, color: ac});
    }

    mapRef.current.panTo(ll);

    if (gps.address) {
      setAddress(gps.address);
    } else {
      clearTimeout(geocodeTimer.current);
      geocodeTimer.current = setTimeout(() => {
        fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${gps.lat}&lon=${gps.lng}&zoom=18`, {
          headers: {'Accept-Language': 'en'}
        })
        .then(r => r.json())
        .then(d => {
          const road = d.address?.road;
          const num  = d.address?.house_number;
          setAddress(road ? `${road}${num ? ', ' + num : ''}` : (d.display_name || '').split(',')[0]);
        })
        .catch(() => {});
      }, 600);
    }
  }, [gps, alertMode]);

  // Redraw movement trail
  useEffect(() => {
    if (!mapRef.current) return;
    if (polyRef.current) { polyRef.current.remove(); polyRef.current = null; }
    if (!trail || trail.length < 2) return;
    polyRef.current = L.polyline(trail.map(p => [p.lat, p.lng]), {
      color: ac, opacity: 0.55, weight: 3,
    }).addTo(mapRef.current);
  }, [trail, alertMode]);

  const displayAddr = address || (hasFix ? `${gps.lat.toFixed(4)}° N, ${gps.lng.toFixed(4)}° E` : null);

  return (
    <div style={{position:'relative', overflow:'hidden'}}>
      <div ref={mapDivRef} style={{width:'100%', height, background:'#091420'}}/>
      {!hasFix && (
        <div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',pointerEvents:'none'}}>
          <div style={{color:'rgba(255,255,255,.2)',fontSize:11,fontFamily:'monospace'}}>Awaiting GPS fix…</div>
        </div>
      )}
      {hasFix && (
        <div style={{position:'absolute',top:8,right:8,background:'rgba(5,10,20,.88)',borderRadius:6,padding:'4px 9px',border:`0.5px solid ${alertMode?'rgba(255,59,92,.35)':'rgba(59,130,246,.3)'}`,pointerEvents:'none',zIndex:1000}}>
          <div style={{color:alertMode?'#ffaabb':'#6eaaff',fontSize:10,fontFamily:'monospace',letterSpacing:.3}}>
            {gps.lat.toFixed(4)}° N  {gps.lng.toFixed(4)}° E
          </div>
        </div>
      )}
      {hasFix && (
        <div style={{position:'absolute',bottom:8,left:8,background:'rgba(5,10,20,.92)',borderRadius:8,padding:'7px 11px',border:`1px solid ${alertMode?'rgba(255,59,92,.4)':'rgba(59,130,246,.3)'}`,maxWidth:'78%',pointerEvents:'none',zIndex:1000}}>
          <div style={{color:alertMode?'#ff8099':'#93c5fd',fontSize:11,fontWeight:600,display:'flex',alignItems:'center',gap:4}}>
            <span>{alertMode ? '⚠' : '📍'}</span>
            <span style={{overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{displayAddr}</span>
          </div>
          <div style={{color:'rgba(255,255,255,.45)',fontSize:10,marginTop:3,fontFamily:'monospace'}}>
            {gps.lat.toFixed(4)}° N · {gps.lng.toFixed(4)}° E · ±{gps.accuracy != null ? `${gps.accuracy.toFixed(0)} m` : '—'}
          </div>
        </div>
      )}
    </div>
  );
}

// ── Video feed ─────────────────────────────────────────────────
function VideoFeed({alertMode, frozen, staleSecs, videoAnnotation, videoAiStatus, liveStream, liveHasVideo, feedFrozen, annotationsEnabled}) {
  const ac = alertMode ? '#ff3b5c' : '#22d3ee';
  const poseLabel   = videoAnnotation && videoAnnotation.poseFlags && videoAnnotation.poseFlags.length > 0
    ? videoAnnotation.poseFlags[0].replace(/_/g,' ').toUpperCase()
    : 'Standing';
  const sourceLabel = videoAnnotation?.source === 'Vision'
    ? 'VISION'
    : videoAnnotation?.source === 'ReceiverFrameDiff'
      ? 'FRAME DIFF'
      : (videoAnnotation?.source || videoAiStatus?.source || 'VIDEO AI').toString().toUpperCase();
  const showFreezeBadge = frozen && (feedFrozen || staleSecs > 0);
  const videoRef = useRef(null);
  const analysisVideoRef = useRef(null);
  const lastVisionAnnotationAtRef = useRef(0);
  const [needsTap, setNeedsTap] = useState(false);

  useEffect(() => {
    if (videoAnnotation?.source === 'Vision') {
      lastVisionAnnotationAtRef.current = Date.now();
    }
  }, [videoAnnotation]);

  // When a real WebRTC MediaStream arrives, attach it to the <video> element
  // and explicitly call play(). Browsers (esp. Safari) block autoplay-with-
  // audio without a fresh user gesture; if play() rejects we surface a tap-
  // to-unmute overlay so the user can grant the gesture.
  useEffect(() => {
    const el = videoRef.current;
    const analysisEl = analysisVideoRef.current;
    if (!el) return;
    if (liveStream) {
      if (el.srcObject !== liveStream) el.srcObject = liveStream;
      if (analysisEl && analysisEl.srcObject !== liveStream) {
        analysisEl.srcObject = liveStream;
        analysisEl.muted = true;
        analysisEl.play().catch(err => console.warn('[video-ai] analysis video play failed:', err));
      }
      if (frozen) {
        el.pause();
        setNeedsTap(false);
        return;
      }
      const p = el.play();
      if (p && p.catch) {
        p.catch(() => {
          el.muted = true;
          el.play().catch(err => console.warn('[video] muted play also failed:', err));
        });
      }
    } else if (el.srcObject) {
      el.srcObject = null;
      if (analysisEl) analysisEl.srcObject = null;
      setNeedsTap(false);
    }
  }, [liveStream, frozen]);

  useEffect(() => {
    const el = analysisVideoRef.current || videoRef.current;
    if (!el || !liveStream || !annotationsEnabled) return;

    const canvas = document.createElement('canvas');
    const width = 48;
    const height = 36;
    canvas.width = width;
    canvas.height = height;
    const ctx = canvas.getContext('2d', { willReadFrequently: true });
    let previous = null;

    const id = setInterval(() => {
      if (!ctx || el.readyState < 2 || el.videoWidth === 0 || el.videoHeight === 0) return;
      if (Date.now() - lastVisionAnnotationAtRef.current < 2500) return;

      try {
        ctx.drawImage(el, 0, 0, width, height);
        const data = ctx.getImageData(0, 0, width, height).data;
        let deltaTotal = 0;
        let changedPixels = 0;

        if (previous) {
          for (let i = 0; i < data.length; i += 4) {
            const current = (data[i] + data[i + 1] + data[i + 2]) / 3;
            const diff = Math.abs(current - previous[i / 4]);
            deltaTotal += diff;
            if (diff > 22) changedPixels += 1;
            previous[i / 4] = current;
          }
        } else {
          previous = new Float32Array(width * height);
          for (let i = 0; i < data.length; i += 4) {
            previous[i / 4] = (data[i] + data[i + 1] + data[i + 2]) / 3;
          }
          return;
        }

        const pixelCount = width * height;
        const changedRatio = changedPixels / pixelCount;
        const meanDelta = deltaTotal / pixelCount;
        const rapidMotion = changedRatio > 0.12 || meanDelta > 10;
        const confidence = Math.max(0.55, Math.min(0.93, 0.58 + changedRatio * 1.8 + meanDelta / 80));
        const annotation = {
          rapidMotion,
          sceneContext: 'live video',
          poseFlags: rapidMotion ? ['rapid_motion'] : [],
          confidence,
          source: 'ReceiverFrameDiff',
        };

        window.dispatchEvent(new CustomEvent('safehaven:entry', {
          detail: { ts: Date.now(), type: 'ai_video_annotation', payload: annotation },
        }));
      } catch (err) {
        console.warn('[video-ai] receiver frame analysis failed:', err);
      }
    }, 900);

    return () => clearInterval(id);
  }, [liveStream, annotationsEnabled]);

  function tapToPlay() {
    const el = videoRef.current;
    if (!el) return;
    el.muted = false;
    el.play().then(() => setNeedsTap(false)).catch(err => console.warn('[video] play failed:', err));
  }

  // Live-stream branch: real video covers the area; we keep only the LIVE
  // pill, person-count chip, optional annotation overlay and corner brackets
  // — the silhouette mock and P1/P2 boxes are dropped because they'd be
  // misleading on top of an actual feed.
  if (liveStream && liveHasVideo) {
    return (
      <div style={{position:'relative',height:280,background:'#000',overflow:'hidden',borderRadius:12,flexShrink:0}}>
        <video ref={videoRef} autoPlay playsInline style={{width:'100%',height:'100%',objectFit:'cover',display:'block'}}/>
        <video ref={analysisVideoRef} autoPlay muted playsInline aria-hidden="true" style={{position:'absolute',width:1,height:1,opacity:0,pointerEvents:'none'}}/>
        {showFreezeBadge && (
          <div style={{position:'absolute',inset:0,zIndex:2,background:'rgba(5,10,18,.56)',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:6,pointerEvents:'none'}}>

            <div style={{color:'rgba(255,255,255,.45)',fontSize:10,fontFamily:'monospace'}}>{staleSecs}s since last frame</div>

        {needsTap && (

            <div style={{color:'#fff',fontSize:13,fontWeight:600}}>Tap to enable audio</div>
          </div>

        <div style={{position:'absolute',top:10,left:10,zIndex:4,display:'flex',alignItems:'center',gap:5,background:'rgba(5,10,20,.55)',padding:'3px 8px',borderRadius:6}}>
          <div style={{width:7,height:7,borderRadius:'50%',background:showFreezeBadge?'#f59e0b':'#ff3b5c',animation:showFreezeBadge?'none':'recBlink 1s ease-in-out infinite'}}/>
          <span style={{color:'#fff',fontSize:10,fontWeight:700,fontFamily:'monospace',letterSpacing:1}}>{showFreezeBadge ? 'FROZEN' : 'LIVE'}</span>
        </div>
        {videoAnnotation && (

        ))}
      </div>
    );
  }

  return (

      {/* simplified indoor scene silhouettes */}

      <div style={{position:'absolute',top:0,left:0,right:0,height:'42%',background:'#080c10'}}/>
      <div style={{position:'absolute',bottom:0,left:0,right:0,height:24,background:'#0a0e14'}}/>
      <div style={{position:'absolute',bottom:24,right:20,width:60,height:48,background:'#0c1120',border:'1px solid #141e30',borderRadius:2}}/>
      <div style={{position:'absolute',left:'22%',bottom:24}}>
        <div style={{width:34,height:90,background:'#111820',borderRadius:'40% 40% 10% 10%',position:'relative'}}>
          <div style={{position:'absolute',top:-22,left:'50%',transform:'translateX(-50%)',width:20,height:22,background:'#111820',borderRadius:'50%'}}/>
        </div>
      </div>
      {/* P1 annotation */}
      {videoAnnotation && <div style={{position:'absolute',zIndex:4,left:'calc(22% - 8px)',bottom:22,width:52,height:118,border:`1.5px solid ${ac}`,boxShadow:`0 0 8px ${alertMode?'rgba(255,59,92,.3)':'rgba(34,211,238,.2)'}`,borderRadius:4,pointerEvents:'none'}}>
        <div style={{position:'absolute',top:-20,left:0,background:ac,color:'#000',fontSize:9,fontWeight:700,fontFamily:'monospace',padding:'2px 5px',borderRadius:'3px 3px 3px 0',whiteSpace:'nowrap'}}>
          P1 · {videoAnnotation ? poseLabel : '—'} {videoAnnotation ? `· ${Math.round((videoAnnotation.confidence||0.87)*100)}%` : ''}
        </div>
      </div>}
      {videoAnnotation && (
        <div style={{position:'absolute',zIndex:4,bottom:8,left:8,background:'rgba(5,10,20,.85)',borderRadius:6,padding:'4px 8px',display:'flex',gap:8}}>

// ── App ────────────────────────────────────────────────────────
function App() {
  const {connected, session, tier, gps, trail, audioLabels, incidentLog, videoAnnotation, videoAiStatus, videoFrozen, staleSecs, elapsed, riskLevel, alertMode, addEntry, setConnected, reset} = useIncidentState();
  const [tab, setTab] = useState('live');
  const [annotationsEnabled, setAnnotationsEnabled] = useState(true);
  const [feedFrozen, setFeedFrozen] = useState(false);
  const [simulatedFreezeSecs, setSimulatedFreezeSecs] = useState(0);
  const [showTranscript, setShowTranscript] = useState(false);
  const {stream: liveStream, hasVideo: liveHasVideo} = useLiveStream();
  const audioLevels = useAudioLevels(liveStream);
  const wsConnected = useWsState();

  const personName = session ? session.personName : null;
  const tierLabel  = tier > 0 ? `TIER ${tier}` : 'IDLE';
  const tierColor  = tier >= 3 ? '#ff8099' : tier >= 1 ? '#fcd34d' : 'rgba(255,255,255,.3)';
  const tierBg     = tier >= 3 ? 'rgba(255,59,92,.2)' : tier >= 1 ? 'rgba(245,158,11,.2)' : 'rgba(255,255,255,.08)';
  const tierBorder = tier >= 3 ? 'rgba(255,59,92,.4)' : tier >= 1 ? 'rgba(245,158,11,.4)' : 'rgba(255,255,255,.1)';

  const mm = String(Math.floor(elapsed / 60)).padStart(2, '0');
  const ss = String(elapsed % 60).padStart(2, '0');

  const gpsCoords = gps ? `${gps.lat.toFixed(4)}° N · ${gps.lng.toFixed(4)}° E` : null;
  const callHref  = gps ? `tel:112?body=Emergency+at+${gps.lat},${gps.lng}` : 'tel:112';
  const visibleVideoAnnotation = annotationsEnabled ? videoAnnotation : null;
  const effectiveVideoFrozen = (videoFrozen && !liveStream) || feedFrozen;
  const effectiveStaleSecs = feedFrozen ? simulatedFreezeSecs : staleSecs;

  useEffect(() => {
    if (!feedFrozen) {
      setSimulatedFreezeSecs(0);
      return;
    }
    setSimulatedFreezeSecs(1);
    const id = setInterval(() => setSimulatedFreezeSecs(s => s + 1), 1000);

<!-- ── WebRTC + signaling layer ─────────────────────────────────────────────
     Plain JS (not JSX) so it runs without Babel. It opens the receiver
     WebSocket against the same origin that served this page (the signaling
     server doubles as the static host), translates the sender's event
     channel into the entry shape the React UI consumes via
     window.addSafeHavenEntry, and pushes the live MediaStream to VideoFeed
     through a custom event.
-->
<script>
(function () {
  const ICE = [
    { urls: 'stun:stun.l.google.com:19302' },
    { urls: 'stun:stun1.l.google.com:19302' },
  ];

  let token = (location.hash || '').replace(/^#/, '').trim();
  let ws = null, pc = null, reconnectTimer = null, reconnectDelay = 2000;
  let stopped = false;
  let sessionStarted = false;
  let lastTier = 0;
  // Set when the next offer is from a fresh sender (initial connect or after
  // peer-disconnected). Cleared on first offer so subsequent re-offers from
  // the same sender (T2 video renegotiation) reuse the existing PC instead
  // of tearing down — which would lose the audio track and ICE state.
  let nextOfferIsFresh = true;

  function tsOf(payload) {
    if (payload && payload.timestamp_iso) {
      const t = Date.parse(payload.timestamp_iso);
      if (!Number.isNaN(t)) return t;
    }
    return Date.now();
  }

  function dispatchEntry(entry) {
    window.dispatchEvent(new CustomEvent('safehaven:entry', { detail: entry }));
  }

  function setStream(stream) {
    window.__safehavenStream = stream || null;
    if (!stream) window.__safehavenHasVideo = false;
    window.dispatchEvent(new CustomEvent('safehaven:stream', { detail: stream || null }));
  }

  function setWsState(open) {
    if (window.__safehavenWsConnected === open) return;
    window.__safehavenWsConnected = open;
    window.dispatchEvent(new CustomEvent('safehaven:wsstate', { detail: open }));
  }

  function markVideoReady() {
    if (window.__safehavenHasVideo) return;
    window.__safehavenHasVideo = true;
    window.dispatchEvent(new CustomEvent('safehaven:videoready'));
  }

  // The polished UI gates everything behind a "session" (`incident_start`).
  // The mobile sender doesn't currently send that event — it jumps straight
  // to `incident_opened` / `tier_changed` — so synthesize one on first signal
  // so the dashboard wakes up. Person name is unknown over the wire today;
  // fall back to a tag derived from the token.
  function ensureSession(ts, personName) {
    if (sessionStarted) return;
    sessionStarted = true;
    dispatchEntry({
      seq: 0,
      ts,
      type: 'incident_start',
      payload: {
        personName: personName || ('Sender ' + token.slice(0, 4)),
        appVersion: 'live',
        pubkey: token,
      },
    });
  }

  function translateEvent(payload) {
    if (!payload) return;
    const ts = tsOf(payload);
    const t  = payload.event_type;

    if (t === 'incident_opened') {
      ensureSession(ts);
      // Sender emits { fromTier, toTier, trigger }. Accept legacy `tier` too.
      const toTier = payload.toTier != null ? payload.toTier
                   : payload.tier   != null ? payload.tier
                   : 1;
      const fromTier = payload.fromTier != null ? payload.fromTier : lastTier;
      dispatchEntry({ ts, type: 'tier_change', payload: { fromTier, toTier, trigger: payload.trigger || 'codeword' } });
      lastTier = toTier;
    } else if (t === 'tier_changed') {
      ensureSession(ts);
      const toTier = payload.toTier != null ? payload.toTier
                   : payload.tier   != null ? payload.tier
                   : lastTier;
      const fromTier = payload.fromTier != null ? payload.fromTier : lastTier;
      dispatchEntry({ ts, type: 'tier_change', payload: { fromTier, toTier, trigger: payload.trigger || 'codeword' } });
      lastTier = toTier;
    } else if (t === 'gps_update') {
      ensureSession(ts);
      dispatchEntry({
        ts, type: 'gps',
        payload: {
          lat: Number(payload.lat),
          lng: Number(payload.lng),
          accuracy: payload.accuracy != null ? Number(payload.accuracy) : null,
          heading:  payload.heading  != null ? Number(payload.heading)  : null,
          speed:    payload.speed    != null ? Number(payload.speed)    : null,
          altitude: payload.altitude != null ? Number(payload.altitude) : null,
          battery:  payload.battery  != null ? Number(payload.battery)  : null,
          battery_state: payload.battery_state || null,
          battery_health: payload.battery_health || null,
          low_power_mode: payload.low_power_mode != null ? !!payload.low_power_mode : null,
          address:  payload.address || null,
        },
      });
    } else if (t === 'ai_label') {
      ensureSession(ts);
      dispatchEntry({
        ts, type: 'ai_label',
        payload: {
          label: payload.label,
          confidence: payload.confidence != null ? Number(payload.confidence) : 0.9,
          source: payload.source || 'sender',
        },
      });
    } else if (t === 'ai_video_annotation') {
      ensureSession(ts);
      dispatchEntry({ ts, type: 'ai_video_annotation', payload: payload.annotation || payload });
    } else if (t === 'ai_video_status') {
      ensureSession(ts);
      dispatchEntry({
        ts,
        type: 'ai_video_status',
        payload: {
          status: payload.status || 'unknown',
          reason: payload.reason || null,
          source: payload.source || 'sender',
        },
      });
    } else if (t === 'transcript') {
      ensureSession(ts);
      dispatchEntry({ ts, type: 'transcript', payload: { text: payload.text || '' } });
    } else if (t === 'incident_closed' || t === 'incident_ended') {
      dispatchEntry({
        ts, type: 'incident_end',
        payload: { durationMs: payload.duration_ms || payload.durationMs || 0 },
      });
      sessionStarted = false;
      lastTier = 0;
    }
  }

  function setupPC() {
    if (pc) { try { pc.close(); } catch (_) {} pc = null; }
    pc = new RTCPeerConnection({ iceServers: ICE });

    pc.onicecandidate = ({ candidate }) => {
      if (candidate && ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ type: 'ice-candidate', candidate }));
      }
    };

    pc.ontrack = ({ streams, track }) => {
      const stream = streams && streams[0];
      if (!stream) return;
      ensureSession(Date.now());
      setStream(stream);
      // The video panel placeholder ("Available at Tier 2+") only goes away
      // once an actual video track lands — the audio-only attachment at T1
      // must not unfreeze it.
      if (track && track.kind === 'video') {
        markVideoReady();
        dispatchEntry({ ts: Date.now(), type: 'video_chunk', payload: {} });
      }
    };

    pc.onconnectionstatechange = () => {
      const s = pc.connectionState;
      console.log('[recv] pc state:', s);
      if (s === 'failed' || s === 'closed') {
        try { pc.close(); } catch (_) {}
        pc = null;
        if (!stopped) reconnectTimer = setTimeout(connect, 2000);
      }
    };
  }

  function connect() {
    if (stopped || !token) return;
    clearTimeout(reconnectTimer);

    const wsProto = location.protocol === 'https:' ? 'wss' : 'ws';
    const wsUrl = `${wsProto}://${location.host}/ws?role=receiver&token=${encodeURIComponent(token)}`;
    console.log('[recv] connecting', wsUrl);
    ws = new WebSocket(wsUrl);

    ws.onopen = () => {
      reconnectDelay = 2000;
      console.log('[recv] ws open');
      setWsState(true);
      // Don't preemptively build a PC here — wait for the sender's offer.
      // Mark the next offer as fresh so the PC gets built then.
      nextOfferIsFresh = true;
    };

    ws.onmessage = async (e) => {
      let msg;
      try { msg = JSON.parse(e.data); } catch (_) { return; }

      if (msg.type === 'offer') {
        // Fresh sender → build a new PC. Re-offer from the same sender (T2
        // adding a video track) → reuse the existing PC so the audio track
        // and ICE state survive.
        if (nextOfferIsFresh || !pc || pc.connectionState === 'closed' || pc.connectionState === 'failed') {
          setupPC();
        }
        nextOfferIsFresh = false;
        try {
          await pc.setRemoteDescription({ type: msg.type, sdp: msg.sdp });
          const answer = await pc.createAnswer();
          await pc.setLocalDescription(answer);
          ws.send(JSON.stringify({ type: 'answer', sdp: answer.sdp }));
        } catch (err) {
          console.error('[recv] offer handling error:', err);
        }
      } else if (msg.type === 'ice-candidate' && msg.candidate) {
        try { await pc.addIceCandidate(msg.candidate); } catch (_) {}
      } else if (msg.type === 'peer-disconnected') {
        setStream(null);
        nextOfferIsFresh = true;
      } else if (msg.type === 'event') {
        translateEvent(msg.payload);
      }
    };

    ws.onclose = (e) => {
      console.warn('[recv] ws close', e.code, e.reason);
      setWsState(false);
      if (stopped) return;
      reconnectTimer = setTimeout(() => {
        reconnectDelay = Math.min(reconnectDelay * 1.5, 30000);
        connect();
      }, reconnectDelay);
    };

    ws.onerror = (e) => { console.error('[recv] ws error', e); try { ws.close(); } catch (_) {} };
  }

  // ── Token entry overlay ────────────────────────────────────────
  const overlay  = document.getElementById('token-overlay');
  const input    = document.getElementById('token-input');
  const submit   = document.getElementById('token-submit');

  function start(t) {
    const trimmed = (t || '').trim();
    if (!trimmed) return;
    token = trimmed;
    location.hash = token;
    overlay.classList.remove('show');
    connect();
  }

  submit.addEventListener('click', () => start(input.value));
  input.addEventListener('keydown', (e) => { if (e.key === 'Enter') start(input.value); });

  if (token) {
    connect();
  } else {
    overlay.classList.add('show');
    setTimeout(() => input.focus(), 50);
  }
})();
</script>
